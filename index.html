<html lang="es">

<style>
{ box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff;
  --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.28);
  --text: #1a1a18; --text-muted: #5f5e5a;
  --accent: #0f6e56; --accent-light: #e1f5ee; --accent-mid: #1d9e75;
  --danger: #a32d2d; --danger-light: #fcebeb;
  --warning: #854f0b; --warning-light: #faeeda;
  --info: #1a4f8a; --info-light: #f0f7ff;
  --radius: 10px; --radius-lg: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
header { background: var(--accent); color: white; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
header h1 { font-size: 16px; font-weight: 600; line-height: 1.2; }
header p { font-size: 11px; opacity: 0.8; }

/* ── TAB BAR EN DOS FILAS ── */
.tab-bar-wrap {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 60px;
  z-index: 99;
}
.tab-bar {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 0.5px solid var(--border);
}
.tab-bar:last-child { border-bottom: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1 0 auto; min-width: 64px; padding: 9px 8px 8px; border: none; background: none; font-size: 11px; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn svg { width: 18px; height: 18px; }

.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* ── FORM ── */
.form-card { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 14px; }
.form-card h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.field-row { margin-bottom: 10px; }
.field-row:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
input[type="text"], input[type="number"], input[type="date"], input[type="time"], input[type="email"], input[type="password"], select, textarea {
  width: 100%; height: 38px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-size: 14px; background: var(--surface); color: var(--text);
}
textarea { height: 70px; padding: 8px 10px; resize: vertical; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent-mid); outline-offset: -1px; border-color: transparent; }
.field-row.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-row.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.calc-field { background: var(--accent-light) !important; color: var(--accent) !important; font-weight: 600; border-color: rgba(15,110,86,0.3) !important; }
.calc-field-neutral { background: #f8f8f6 !important; color: var(--text-muted) !important; font-weight: 500; border-color: rgba(0,0,0,0.15) !important; }
.pesos-summary { background: var(--accent-light); border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; border: 0.5px solid rgba(15,110,86,0.25); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.peso-item { text-align: center; }
.peso-item .lbl { font-size: 11px; color: var(--accent); margin-bottom: 2px; font-weight: 500; }
.peso-item .val { font-size: 19px; font-weight: 700; color: var(--accent); }
.peso-item .unit { font-size: 11px; color: var(--accent); opacity: 0.7; }
.range-hint { background: var(--info-light); border: 0.5px solid #b3d4f5; border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--info); margin-top: 6px; display: none; }
.range-hint strong { font-weight: 600; }
.date-hint { font-size: 11px; color: var(--info); margin-top: 4px; font-weight: 500; min-height: 14px; }
.btn { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:active { background: #0c5c46; }
.btn-secondary { background: var(--surface); color: var(--text); }
.btn-secondary:active { background: var(--bg); }
.btn-danger { background: var(--danger-light); color: var(--danger); border-color: rgba(163,45,45,0.3); }
.btn-excel { background: #1D6F42; color: white; border-color: #1D6F42; }
.btn-excel:active { background: #155233; }
.banner { border-radius: var(--radius); padding: 10px 12px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
.banner svg { flex-shrink: 0; margin-top: 1px; }
.banner-success { background: var(--accent-light); color: var(--accent); }
.banner-warning { background: var(--warning-light); color: var(--warning); }
.banner-danger  { background: var(--danger-light);  color: var(--danger); }

/* ── DB ── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
.stat-card .val { font-size: 22px; font-weight: 600; color: var(--accent); }
.stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.record { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; cursor: pointer; }
.record:active { border-color: var(--accent-mid); }
.rec-main { flex: 1; min-width: 0; }
.rec-boleta { font-size: 14px; font-weight: 600; }
.rec-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-peso { text-align: right; flex-shrink: 0; }
.rec-peso .kg { font-size: 15px; font-weight: 600; color: var(--accent); }
.rec-peso .fecha { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-top: 4px; }
.badge-green { background: var(--accent-light); color: var(--accent); }
.badge-blue  { background: var(--info-light);   color: var(--info); }
.empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); }
.empty-state svg { margin: 0 auto 10px; display: block; opacity: 0.3; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
.filter-row input { flex: 1; height: 36px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-size: 13px; background: var(--surface); }
.export-bar { display: flex; gap: 8px; padding: 12px 0 4px; border-top: 0.5px solid var(--border); margin-top: 12px; flex-wrap: wrap; }
.export-bar .btn { font-size: 13px; padding: 10px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 16px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
.detail-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-row .dk { color: var(--text-muted); }
.detail-row .dv { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }
.detail-section { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 0 4px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }

/* ── SYNC TOAST ── */
#sync-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; align-items: center; gap: 7px; z-index: 9999; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
#sync-toast.show { display: flex; }
#sync-toast.ok { background: var(--accent); }
#sync-toast.err { background: var(--danger); }
#sync-toast.pending { background: #555; }

.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Firebase loading / error ── */
#fb-loading { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#fb-loading .spin-lg { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
#fb-loading p { font-size:14px; color:var(--text-muted); }
#fb-error { position:fixed; inset:0; background:var(--bg); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:24px; text-align:center; }
#fb-error h2 { color:var(--danger); font-size:16px; }
#fb-error p { font-size:13px; color:var(--text-muted); max-width:300px; line-height:1.6; }
#fb-error button { background:var(--accent); color:white; border:none; padding:10px 24px; border-radius:var(--radius); font-size:14px; cursor:pointer; }

/* ── Login / Pending screens ── */
#login-screen, #pending-screen {
  display: none; position: fixed; inset: 0; background: var(--bg);
  z-index: 9998;
  flex-direction: column; align-items: center; justify-content: center; padding: 24px;
}
.auth-card {
  background: var(--surface); border-radius: var(--radius-lg);
  border: 0.5px solid var(--border);
  padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.auth-card h2 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.auth-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.auth-logo { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.auth-logo span { font-size: 15px; font-weight: 700; color: var(--accent); }
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.auth-tab { flex: 1; padding: 8px; border: none; background: none; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.auth-form { display: none; }
.auth-form.active { display: block; }
.auth-form .field-row { margin-bottom: 12px; }
.auth-divider { text-align: center; font-size: 11px; color: var(--text-muted); margin: 8px 0; }
#pending-screen .pending-card {
  background: var(--surface); border-radius: var(--radius-lg); padding: 28px 24px; text-align: center;
  max-width: 360px; border: 0.5px solid var(--border);
}
#pending-screen .pending-card .icon { font-size: 40px; margin-bottom: 12px; }
#pending-screen .pending-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
#pending-screen .pending-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }

/* ── Admin panel ── */
#tab-admin { padding: 16px; }

/* ── DASHBOARD / GRÁFICOS ── */
.slicers-card { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 14px; }
.slicers-card h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.slicers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.slicers-grid .full { grid-column: 1 / -1; }
.slicer-actions { display: flex; gap: 8px; margin-top: 10px; }

/* ── Multi-select dropdown slicer ── */
.ms-wrap { position: relative; }
.ms-btn {
  width: 100%; height: 38px; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
  padding: 0 28px 0 10px; font-size: 13px; background: var(--surface); color: var(--text);
  cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; justify-content: space-between; gap: 4px;
}
.ms-btn .ms-arrow { flex-shrink:0; transition: transform .15s; }
.ms-btn.open .ms-arrow { transform: rotate(180deg); }
.ms-btn .ms-tag-count {
  background: var(--accent); color: white; border-radius: 999px;
  font-size: 10px; font-weight: 700; padding: 1px 6px; flex-shrink:0;
}
.ms-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 300;
  background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.14); max-height: 220px; overflow-y: auto;
}
.ms-dropdown.open { display: block; }
.ms-option {
  display: flex; align-items: center; gap: 8px; padding: 9px 12px;
  font-size: 13px; cursor: pointer; border-bottom: 0.5px solid var(--border);
}
.ms-option:last-child { border-bottom: none; }
.ms-option:hover { background: var(--bg); }
.ms-option input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; flex-shrink:0; cursor:pointer; }
.ms-option label { cursor:pointer; flex:1; }
.kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi-card { background: var(--accent-light); border: 0.5px solid rgba(15,110,86,0.25); border-radius: var(--radius); padding: 12px; text-align: center; }
.kpi-card .val { font-size: 20px; font-weight: 700; color: var(--accent); }
.kpi-card .lbl { font-size: 11px; color: var(--accent); opacity: 0.85; margin-top: 2px; }
.chart-card { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 14px; }
.chart-card h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.chart-wrap { position: relative; width: 100%; height: 260px; }
.dash-empty { text-align: center; padding: 24px 16px; color: var(--text-muted); font-size: 13px; }
</style>

<script type="module">
// 1. Nuevas importaciones de Firebase con soporte Offline-First y App Check
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, addDoc, getDocs, doc, updateDoc, deleteDoc,
  query, orderBy, onSnapshot, where, limit, startAfter,
  serverTimestamp, setDoc, increment, writeBatch 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { initializeAppCheck, ReCaptchaEnterpriseProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js";

// 2. Importamos la configuración del archivo externo protegido
import { firebaseConfig } from './config.js';

const app = initializeApp(firebaseConfig);

// ── PREPARACIÓN PARA APP CHECK (PASO D) ──
// Descomenta este bloque cuando actives reCAPTCHA en la consola de Firebase
/*
const appCheck = initializeAppCheck(app, {
  provider: new ReCaptchaEnterpriseProvider('TU_CLAVE_PUBLICA_DE_RECAPTCHA_AQUI'),
  isTokenAutoRefreshEnabled: true
});
*/

// 3. Inicialización de Firestore con Persistencia Offline Activada
const db_f = initializeFirestore(app, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
});
const auth = getAuth(app);

const COL = "acarreos"; 
const COL_USERS = "usuarios";
const COL_RESUMEN = "resumenes"; 

let db = []; window.db = db; 
let dbHistorial = []; window.dbHistorial = dbHistorial;
let unsubscribe = null; let unsubUsers = null; 
let isInitialized = false; 
let currentUser = null; 
let currentUserDoc = null;
let ventanaDias = parseInt(localStorage.getItem('db_ventana_dias') || '30', 10); 

function findRecord(fid) { return db.find(x => x._fid === fid) || dbHistorial.find(x => x._fid === fid); } 
window.findRecord = findRecord;

function appReady() { 
  document.getElementById('fb-loading').style.display = 'none'; 
  document.getElementById('fb-error').style.display = 'none'; 
  document.getElementById('login-screen').style.display = 'none'; 
  document.getElementById('pending-screen').style.display= 'none'; 
  document.getElementById('app-shell').style.display = 'block';
  const selVentana = document.getElementById('db-ventana'); 
  if (selVentana) selVentana.value = String(ventanaDias); 
} 

function showLogin() { 
  document.getElementById('fb-loading').style.display = 'none'; 
  document.getElementById('fb-error').style.display = 'none';
  document.getElementById('app-shell').style.display = 'none'; 
  document.getElementById('pending-screen').style.display= 'none'; 
  document.getElementById('login-screen').style.display = 'flex'; 
  const bl = document.getElementById('btn-login'); 
  if (bl) { bl.disabled = false; bl.textContent = 'Entrar'; } 
} 

function showPending() { 
  document.getElementById('fb-loading').style.display = 'none'; 
  document.getElementById('fb-error').style.display = 'none'; 
  document.getElementById('app-shell').style.display = 'none'; 
  document.getElementById('login-screen').style.display = 'none'; 
  document.getElementById('pending-screen').style.display= 'flex';
} 

function appError(msg) { 
  document.getElementById('fb-loading').style.display = 'none'; 
  document.getElementById('fb-error').style.display = 'flex'; 
  document.getElementById('fb-error-msg').textContent = msg;
} 

window.switchAuthTab = function(tab) { 
  document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active')); 
  document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active')); 
  document.querySelector('[data-tab="' + tab + '"]').classList.add('active'); 
  document.getElementById('auth-form-' + tab).classList.add('active');
} 

// SE ELIMINÓ window.registrarUsuario para blindar la app (solo admin crea cuentas)

window.loginUsuario = async function() { 
  const email = document.getElementById('login-email').value.trim(); 
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { alert('Ingresa correo y contraseña.'); return; } 
  const btn = document.getElementById('btn-login'); 
  btn.disabled = true;
  btn.textContent = 'Entrando…'; 
  try { 
    await signInWithEmailAndPassword(auth, email, pass); 
  } catch (e) { 
    alert('Error al entrar: Correo o contraseña incorrectos.');
    btn.disabled = false; btn.textContent = 'Entrar'; 
  } 
} 

window.logoutUsuario = async function() { 
  if (!confirm('¿Cerrar sesión?')) return;
  if (unsubscribe) { unsubscribe(); unsubscribe = null; } 
  if (unsubUsers) { unsubUsers(); unsubUsers = null; } 
  isInitialized = false;
  db = []; window.db = db; 
  await signOut(auth); 
} 

onAuthStateChanged(auth, async (user) => { 
  currentUser = user; 
  if (!user) { isInitialized = false; showLogin(); return; } 
  try { 
    const snap = await getDocs(collection(db_f, COL_USERS)); 
    const myDoc = snap.docs.find(d => d.id === user.uid); 
    currentUserDoc = myDoc ? myDoc.data() : null; 
    
    if (!currentUserDoc) { appError('No se encontró tu perfil. Contacta al administrador.'); return; } 
    if (currentUserDoc.status !== 'autorizado') { showPending(); return; } 
    
    const rol = currentUserDoc.rol || 'capturista'; 
    const esMaster = rol === 'master'; const esAdmin = rol === 'admin'; const esVisor = rol === 'visor'; const esCapturista = rol === 'capturista'; 
    const esAdminOMaster = esAdmin || esMaster; 
    const tag = document.getElementById('user-tag'); 
    const etiquetaRol = esMaster ? ' (master)' : esAdmin ? ' (admin)' : esVisor ? ' (visor)' : ' (capturista)'; 
    if (tag) tag.textContent = currentUserDoc.nombre + etiquetaRol; 
    
    window._currentUserRol = rol; 
    
    const captBtn = document.getElementById('t-form');
    if (captBtn) captBtn.style.display = (esCapturista || esAdmin) ? 'flex' : 'none'; 
    const pendientesBtn = document.getElementById('btn-pendientes-tab');
    if (pendientesBtn) pendientesBtn.style.display = (esCapturista || esAdmin) ? 'flex' : 'none';
    const dbBtn = document.getElementById('t-db'); 
    if (dbBtn) dbBtn.style.display = esAdminOMaster ? 'flex' : 'none'; 
    const resumenBtn = document.getElementById('btn-resumen-tab');
    if (resumenBtn) resumenBtn.style.display = (esAdminOMaster || esVisor || esCapturista) ? 'flex' : 'none';
    const graficosBtn = document.getElementById('btn-graficos-tab'); 
    if (graficosBtn) graficosBtn.style.display = (esAdminOMaster || esVisor) ? 'flex' : 'none'; 
    const excelBtn = document.getElementById('btn-excel-tab'); 
    if (excelBtn) excelBtn.style.display = (esAdminOMaster || esVisor) ? 'flex' : 'none';
    const adminBtn = document.getElementById('btn-admin-tab'); 
    if (adminBtn) adminBtn.style.display = esAdminOMaster ? 'flex' : 'none'; 
    
    const tabsPermitidas = [];
    if (esCapturista || esAdmin) tabsPermitidas.push('form', 'pendientes', 'resumen'); 
    if (esAdminOMaster) tabsPermitidas.push('db'); 
    if (esAdminOMaster || esVisor) tabsPermitidas.push('graficos', 'excel', 'resumen'); 
    if (esAdminOMaster) tabsPermitidas.push('admin');
    
    const tabActivaEl = document.querySelector('.tab-content.active'); 
    const tabActivaId = tabActivaEl ? tabActivaEl.id.replace('tab-', '') : 'form'; 
    if (!tabsPermitidas.includes(tabActivaId) && tabsPermitidas.length) { showTab(tabsPermitidas[0]); } 
    
    startRealtimeSync(); 
  } catch (e) { appError('Error al verificar tu cuenta: ' + e.message); } 
});

function cutoffFecha(dias) { 
  const d = new Date(); d.setDate(d.getDate() - dias); return d.toISOString().slice(0, 10);
} 

function startRealtimeSync() { 
  if (unsubscribe) { unsubscribe(); unsubscribe = null; } 
  const LIMITE_VENTANA = { 7: 3000, 30: 6000, 90: 9500, 365: 9500 };
  const tope = Math.min(LIMITE_VENTANA[ventanaDias] || 6000, 9500); 
  const q = query( collection(db_f, COL), where('fecha1', '>=', cutoffFecha(ventanaDias)), orderBy('fecha1', 'desc'), limit(tope) );
  
  unsubscribe = onSnapshot(q, (snapshot) => { 
    db = snapshot.docs.map(d => ({ _fid: d.id, ...d.data() })); 
    window.db = db; 
    const recortado = db.length >= tope; 
    if (!isInitialized) { 
      isInitialized = true; appReady(); 
      if (typeof renderDB === 'function') renderDB(); 
    } else { 
      if (typeof renderDB === 'function') renderDB(); 
      if (document.getElementById('tab-db') && document.getElementById('tab-db').classList.contains('active')) { 
        if(typeof updateSyncNote === 'function') updateSyncNote((recortado ? '⚠️ Tope alcanzado · ' : '✅ Sincronizado · ') + db.length + ' registros'); 
      } 
    } 
  }, (err) => { 
    console.error("Firestore error:", err); 
    if (!isInitialized) appError('No se pudo conectar a la base de datos.\n' + err.message); 
    else window.showSyncToast('⚠️', 'Sincronizando localmente...', 'err'); 
  });
} 

// 4. LÓGICA DE ESTADO DE RED PARA EL INDICADOR VISUAL
const statusEl = document.getElementById('status-conexion');
function updateNetworkStatus() {
  if (navigator.onLine) {
    if (statusEl) {
      statusEl.textContent = 'Sincronizado';
      statusEl.style.background = 'var(--accent-mid)';
    }
  } else {
    if (statusEl) {
      statusEl.textContent = 'Sin red (Local)';
      statusEl.style.background = 'var(--warning)';
    }
  }
}
window.addEventListener('online', updateNetworkStatus);
window.addEventListener('offline', updateNetworkStatus);
// Inicializar estado de red
setTimeout(updateNetworkStatus, 1000);
